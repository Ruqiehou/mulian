<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天狐慕氏联邦帝国铁路票价系统</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        select, button { padding: 10px; margin: 10px; font-size: 16px; border-radius: 5px; }
        button { background: #1a5fb4; color: white; cursor: pointer; }
        .result { font-size: 20px; margin: 20px; color: #d32f2f; font-weight: bold; }
        .tip { color: #666; font-size: 14px; }
        .seat-option { margin: 10px 0; }
        .btn-home { display: inline-flex; align-items: center; gap: 8px; margin-top: 25px; padding: 12px 28px; font-size: 15px; color: #1a5fb4; background: #e8f0fe; border: 2px solid #1a5fb4; border-radius: 40px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; cursor: pointer; }
        .btn-home:hover { background: #1a5fb4; color: white; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(26, 95, 180, 0.3); }
        .btn-home:active { transform: translateY(0); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚄 天狐慕氏联邦帝国铁路票价系统</h1>
    <p class="tip">系统将根据地图与官方票价表，自动计算两地间最便宜的路线</p>

    <div>
        <label for="start">出发车站:</label>
        <select id="start"></select>
    </div>

    <div>
        <label for="end">到达车站:</label>
        <select id="end"></select>
    </div>

    <div class="seat-option">
        <label>座位等级:</label>
        <input type="radio" id="yibei" name="seat" value="yibei" checked> <label for="yibei">乙等座</label>
        <input type="radio" id="jia" name="seat" value="jia"> <label for="jia">甲等座</label>
    </div>

    <button onclick="findCheapestRoute()">💰 计算最便宜票价</button>

    <div class="result" id="result">结果将显示在这里</div>

    <div style="text-align: center;">
        <a href="index.html" class="btn-home">🏠 回主页</a>
    </div>
</div>

<script>
    let connections = {};
    let stations = {};
    let fare = {
        sameRegion: { yibei: 200, jia: 300 },
        crossRegion: { baseYibei: 200, baseJia: 300, jiaServicePerStep: 100 }
    };

    function findCheapestRoute() {
        const startStation = document.getElementById('start').value;
        const endStation = document.getElementById('end').value;
        const seatClass = document.querySelector('input[name="seat"]:checked').value;

        if (!startStation || !endStation) {
            document.getElementById('result').innerHTML = `❌ 错误：请先选择车站！`;
            return;
        }

        const startRegion = stations[startStation];
        const endRegion = stations[endStation];

        if (startRegion === endRegion) {
            const price = seatClass === 'jia' ? fare.sameRegion.jia : fare.sameRegion.yibei;
            document.getElementById('result').innerHTML = `✅ 同地区通勤<br>💰 <strong>${price} 文</strong> (起步价)`;
            return;
        }

        const result = findShortestPath(startRegion, endRegion);
        if (!result) {
            document.getElementById('result').innerHTML = `❌ 错误：无通路！`;
            return;
        }

        const { distance, path, steps } = result;
        const { baseYibei, baseJia, jiaServicePerStep } = fare.crossRegion;
        const yiTotal = baseYibei + distance;
        const jiaTotal = baseJia + distance + (steps * jiaServicePerStep);

        let displayText = `🛣️ 路线: ${path.join(" → ")}<br>🧮 跨区段数: ${steps} 段`;
        if (seatClass === 'yibei') {
            displayText += `<br>🎫 乙等座: ${yiTotal} 文`;
        } else {
            displayText += `<br>👑 甲等座: ${jiaTotal} 文<br><small>(起步${baseJia} + 跨区费${distance} + 服务费${steps * jiaServicePerStep})</small>`;
        }
        document.getElementById('result').innerHTML = displayText;
    }

    function findShortestPath(start, end) {
        const distances = {};
        const previous = {};
        const visited = new Set();
        const pq = [];

        for (let node in connections) {
            distances[node] = Infinity;
            previous[node] = null;
        }
        distances[start] = 0;
        pq.push({ node: start, dist: 0 });

        while (pq.length > 0) {
            pq.sort((a, b) => a.dist - b.dist);
            const { node: current, dist: currentDist } = pq.shift();

            if (visited.has(current)) continue;
            visited.add(current);

            if (current === end) {
                const path = [];
                let step = current;
                let stepCount = 0;
                while (step !== null) {
                    path.unshift(step);
                    if (previous[step]) stepCount++;
                    step = previous[step];
                }
                return { distance: currentDist, path: path, steps: stepCount };
            }

            const neighbors = connections[current] || {};
            for (let neighbor in neighbors) {
                if (!visited.has(neighbor)) {
                    const newDist = currentDist + neighbors[neighbor];
                    if (newDist < distances[neighbor]) {
                        distances[neighbor] = newDist;
                        previous[neighbor] = current;
                        pq.push({ node: neighbor, dist: newDist });
                    }
                }
            }
        }
        return null;
    }

    function initStationSelects() {
        const startSelect = document.getElementById('start');
        const endSelect = document.getElementById('end');
        startSelect.innerHTML = '';
        endSelect.innerHTML = '';
        for (let code in stations) {
            startSelect.add(new Option(`${code} (${stations[code]})`, code));
            endSelect.add(new Option(`${code} (${stations[code]})`, code));
        }
    }

    window.onload = async function() {
        try {
            const res = await fetch('price_railway.json');
            if (!res.ok) throw new Error('加载失败');
            const data = await res.json();
            connections = data.connections || {};
            stations = data.stations || {};
            if (data.fare) fare = data.fare;
            initStationSelects();
        } catch (e) {
            document.getElementById('result').innerHTML = `❌ 无法加载 price_railway.json`;
        }
    };
</script>
<style>
    body::after {
      content: "版权所有 © 2019-2026 天狐慕氏联邦帝国";
      background-color: #f5f5f5;
      padding: 10px;
      text-align: center;
      font-family: Arial, sans-serif;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
    }
  </style>
</body>
</html>
